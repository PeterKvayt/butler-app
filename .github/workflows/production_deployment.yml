# TODO: add caching

#name: Deploy
#run-name: Deploy 🚀 to ${{ inputs.deploy_target }} by @${{ github.actor }} 
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Pull the repo
      uses: actions/checkout@v5
    - name: Transform appsettings
      uses: tnikFi/json-file-transform@v3
      with:
        files: '**/appsettings.json'
        key-value-pairs: |
          Telegram.BotToken=${{ secrets.TELEGRAM_BOT_TOKEN }}
          Telegram.WebhookSecret=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          Yandex.Disk.AccessToken=${{ secrets.YANDEX_DISK_ACCESS_TOKEN }}
          App.BaseUrl=https://${{ vars.SERVER_DOMAIN_NAME }}
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.102
    - name: Dotnet info
      run: dotnet --info
    - name: Restore
      run: |
        dotnet restore \
        --runtime win-x64
    - name: Build
      run: | 
        dotnet build src/Api/Api.csproj \
        --no-restore \
        --configuration Release \
        --runtime win-x64
    - name: Publish
      run: |
        dotnet publish src/Api/Api.csproj \
        --output src/Api/bin/publish \
        --configuration Release \
        --verbosity normal \
        --no-build \
        --runtime win-x64
    - name: Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ vars.SERVER_DOMAIN_NAME }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./src/Api/bin/publish/ # directory with artifacts from prev step
        server-dir: ${{ vars.SERVER_DIR }}